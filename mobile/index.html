<!DOCTYPE html>
<html>
  <head>
    <title>Press Mobile</title>
    <link rel="icon" href="press-button.png" type="Images/png">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <body style="background-color: rgb(255, 246, 235);"></body>
  </head>
  <body>


    <style>
      @media (orientation: portrait) {
        .press {
        position: absolute;
        width: 250px;
        height: 100px;
        left: 68px;
        bottom: 580px;
        background-color:rgb(255, 224, 183) ;
        border: 10;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: x-large;
        font-weight: bolder;
        border-radius: 20px;
      }

      .press:active {
        background-color: rgb(255, 200, 133);
      }
      }

      @media (orientation: landscape) {
        .press {
        display: block;
        opacity: 0%;
        position: absolute;
        width: 250px;
        height: 100px;
        left: 263px;
        bottom: 170px;
        background-color:rgb(255, 224, 183) ;
        border: 10;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: x-large;
        font-weight: bolder;
        border-radius: 20px;
        pointer-events: none;
      }
      }
      
    </style>
    <button class="press" id="PRESSME">PRESS HERE</button>

    <style>
      @media (orientation: portrait) {
        #NAS {
        position:absolute;
        display: block;
        left: 178px;
        bottom: 400px;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: xxx-large;
        font-weight: bolder;
        transform: 0;
      }
      }
      
      @media (orientation: landscape) {
        #NAS {
        opacity: 0%;
        position: absolute;
        display: block;
        left: 373px;
        bottom: 40px;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: xxx-large;
        font-weight: bolder;
        
      }
      }
      @media (orientation: portrait) {
        .WarningLandscape {
          opacity: 0%;
        }
      }
      @media (orientation: landscape) {
        .WarningLandscape {
          position: absolute;
          left: 100px;
          bottom: 140px;
        }
      }
    </style>
    <h1 id="NAS">0</h1>
    <h2 class="WarningLandscape">Please hold your device in the portrait orientation :></h2>
    <script>  
      let no = 0
      document.getElementById("PRESSME").addEventListener("click",function() {
        no ++;
        document.getElementById("NAS").textContent = no;
        if (no >= 10) {
          NAS.style.left = "159px";
        }
        if (no >= 100) {
          NAS.style.left = "152px"
        }
        if (no >= 1000) {
          NAS.style.left = "145px"
        }
        if (no === 1000) {
          NAS.style.left = "29px"
          document.getElementById("NAS").textContent = "Congratulation!"
          document.getElementById("PRESSME").textContent = "Again?"
          document.getElementById("PRESSME").addEventListener("click", function() {
            NAS.style.bottom = "1000px"
            location.reload()

          })
        }
      })
    </script>
  </body>
</html>
