<!DOCTYPE html>
<html>
  <head>
    <title>Port</title>
  </head>
  <body>
    <script>
      window.onload = function() {
        let CUD = navigator.userAgent.toLowerCase();

        if (CUD.includes('tablet') || CUD.includes('iphone') || CUD.includes('ipad')) {
          document.getElementById().innerHTML = "Your Device Are Not Supported :<"
        } else if (CUD.includes('mobile') || CUD.includes('android')) {
          window.open("https://mgxeltra.github.io/pressincrease/mobile", '_self')
        } else if (CUD.includes('windows') || CUD.includes('pc') || CUD.includes('computer') || CUD.includes('laptop')) {
          window.open("https://mgxeltra.github.io/pressincrease/main", '_self')
          window.close("https://mgxeltra.github.io/pressincrease/")
        }
      }
    </script>
  </body>
</html>
