<!DOCTYPE html>
<html>
  <head>
    <title>PRESS</title>
    <link rel="icon" type="Images/png" href="/press-button.png">
    <style>
      body {
        background-color: rgb(255, 250, 244);
      }
    </style>
  </head>
  <body>

    <script>
      window.onload = function() {
        let CUD = navigator.userAgent.toLowerCase();

        if (CUD.includes('tablet') || CUD.includes('iphone') || CUD.includes('ipad')) {
          null
        } else if (CUD.includes('mobile') || CUD.includes('android')) {
          window.open("/pressincrease/mobile")
        }
      }
    </script>


    <style>
      .press {
        position: absolute;
        width: 400px;
        height: 200px;
        left: 570px;
        bottom: 340px;
        background-color:rgb(255, 224, 183) ;
        border: 0;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: xxx-large;
        cursor: pointer;
        font-weight: bolder;
        border-radius: 20px;
      }

      .press:active {
        background-color: rgb(255, 200, 133);
      }
    </style>
    <button class="press" id="PRESSME">PRESS HERE</button>

    <style>
      #NUM {
        position: absolute;
        left: 747px;
        bottom: 200px;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: xxx-large;
        font-weight: bolder;
        
      }
    </style>
    <h1 id="NUM">0</h1>
    
    <script>
      let no = 0

      document.getElementById("PRESSME").addEventListener("click", function() {
        no ++;
        document.getElementById("NUM").textContent = no;
        if (no >= 10) {
          NUM.style.left = "735px";
        }
        if (no >= 100) {
          NUM.style.left = "722px"
        }
        if (no >= 1000) {
          NUM.style.left = "703px"
        }
        if (no === 1000) {
          NUM.style.left = "577.5px"
          document.getElementById("NUM").textContent = "Congratulation!"
          document.getElementById("PRESSME").textContent = "Again?"
          document.getElementById("PRESSME").addEventListener("click", function() {
            NUM.style.bottom = "1000px"
            location.reload()

          })
        }
      })

      
    </script>
  </body>
</html>
